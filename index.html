<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أبو سراج فون</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0c111d;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1a2235;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #f2a900;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #f2a900; margin-bottom: 10px; }
        .price { font-size: 24px; color: #f2a900; font-weight: bold; margin: 20px 0; }
        .btn {
            background-color: #f2a900;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background-color: #d49400; }
        .footer-text { font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>أبو سراج فون</h1>
        <p>عقرة - دهوك</p>
        <hr style="border: 0.5px solid #333;">
        <h3>iPhone 15 Pro Max</h3>
        <div class="price">Pi 10</div>
        
        <button class="btn" onclick="transferPi()">شراء الآن (Pi 10)</button>

        <p class="footer-text">نسخة موثقة لشبكة Pi Network</p>
    </div>

    <script>
        // تهيئة تطبيق Pi بشكل صحيح
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function transferPi() {
            try {
                const paymentData = {
                    amount: 10,
                    memo: "شراء هاتف من متجر أبو سراج",
                    metadata: { item: "iPhone 15 Pro Max" }
                };

                const callbacks = {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Payment Ready:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("تمت عملية الدفع بنجاح يا صقر!");
                    },
                    onCancel: (paymentId) => { 
                        console.log("Payment Cancelled"); 
                    },
                    onError: (error, payment) => { 
                        console.error("Error:", error);
                    }
                };

                // فتح المحفظة
                await Pi.createPayment(paymentData, callbacks);
                
            } catch (err) {
                alert("تأكد من فتح المتجر من داخل Pi Browser");
            }
        }
    </script>
</body>
</html>
