<!doctype html>
<html lang="ar" dir="rtl"> <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <title>أبو سراج فون | Abu Seraj Phone</title>
    <link rel="icon" href="./logo.jpg" type="image/jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      if (window.Pi && typeof window.Pi.init === "function") {
        window.Pi.init({ version: "2.0", sandbox: false }); // تم تركها false للعمل الحقيقي مستقبلاً
      }

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0b1020;
        color: #fff;
        font-family: 'Cairo', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        text-align: center;
      }
      header {
        width: 100%;
        background: rgba(11, 16, 32, 0.8);
        backdrop-filter: blur(10px);
        padding: 12px 25px;
        border-bottom: 2px solid #ff9800; /* لمسة ذهبية للمحل */
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        z-index: 100;
      }
      .main-content {
        margin-top: 100px;
        padding: 20px;
      }
      .store-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 { color: #ff9800; margin-bottom: 5px; }
      .address-box { margin-top: 30px; font-size: 0.9em; color: #aaa; }
    </style>
  </head>
  <body>
    <header>
      <div class="user-info">
        <div class="user-avatar">AS</div> <div class="user-text">
            <span>أبو سراج فون</span>
            <small>عقرة - Akre</small>
        </div>
      </div>
    </header>

    <div class="main-content">
      <div class="store-card">
        <h1>أبو سراج فون</h1>
        <p>باوکی سیراج فۆن | Abu Seraj Phone</p>
        <hr style="border: 0.5px solid #333; width: 80%;">
        
        <p>🇮🇶 المتجر الأول للهواتف في كردستان العراق بدفع Pi</p>
        <p>☀️ یەکەم کۆگا بۆ مۆبایل بە پارەدانی Pi</p>
        <p>🇬🇧 Premium Phones & Pi Payments</p>
      </div>

      <div class="address-box">
        <p>📍 دهوك - عقرة - Kurdistan, Iraq</p>
      </div>
    </div>
  </body>
</html>
