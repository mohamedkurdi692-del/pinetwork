<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <title>أبو سراج فون - بابێ سراج</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      if (window.Pi && typeof window.Pi.init === "function") {
        window.Pi.init({ version: "2.0", true: false });
      }
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0b1020;
        color: #fff;
        font-family: 'Cairo', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        width: 100%;
        background: rgba(11, 16, 32, 0.9);
        backdrop-filter: blur(10px);
        padding: 12px 25px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        z-index: 100;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .user-avatar {
        width: 35px;
        height: 35px;
        background: #facc15;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #0b1020;
        font-size: 14px;
      }
      .username {
        font-size: 16px;
        font-weight: 700;
        color: #facc15;
      }
      .status {
        font-size: 10px;
        opacity: 0.7;
      }
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 100px 20px 40px;
        text-align: center;
      }
      .store-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 30px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      .product-img {
        font-size: 80px;
        margin-bottom: 20px;
      }
      .price-tag {
        font-size: 32px;
        font-weight: 900;
        color: #facc15;
        margin: 15px 0;
      }
      .pay-btn {
        background: linear-gradient(135deg, #facc15 0%, #eab308 100%);
        color: #0b1020;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: 800;
        border-radius: 50px;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
      }
      .pay-btn:active { transform: scale(0.95); }
      
      .contact-links {
        margin-top: 30px;
        display: flex;
        gap: 20px;
        justify-content: center;
      }
      .contact-links a {
        color: #fff;
        text-decoration: none;
        font-size: 24px;
        opacity: 0.8;
      }
      .location-info {
        margin-top: 40px;
        font-size: 14px;
        opacity: 0.6;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">؟</div>
        <div class="user-text">
          <div id="usernameDisplay" class="username">جاري التحقق...</div>
          <div id="statusDisplay" class="status">Connecting...</div>
        </div>
      </div>
    </header>
    
    <main class="main-content">
      <div class="store-card">
        <div class="product-img">📱</div>
        <h1 style="margin:0; font-weight:900;">أبو سراج فون</h1>
        <h3 style="color:#facc15; margin:5px 0;">بابێ سراج</h3>
        <p>iPhone 15 Pro Max</p>
        <div class="price-tag">10 Pi</div>
        <button id="payBtn" class="pay-btn">إتمام الشراء | کڕین</button>

        <div class="contact-links">
          <a href="https://wa.me/9647515037922">💬 WhatsApp</a>
          <a href="https://t.me/+9647515037922">✈️ Telegram</a>
        </div>
      </div>

      <div class="location-info">
        كوردستان العراق - دهوك - عقرة<br>
        کوردستانا عیراقێ - دهۆك - ئاکرێ
      </div>
    </main>

    <script>
      (function() {
        async function postJson(url, body) {
          const r = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body || {}),
          });
          return { ok: r.ok, status: r.status, text: await r.text() };
        }

        async function initPay() {
          const userEl = document.getElementById('usernameDisplay');
          const statusEl = document.getElementById('statusDisplay');
          const btn = document.getElementById('payBtn');

          try {
            const auth = await window.Pi.authenticate(["username", "payments"], function(incomplete) {
               console.log("Incomplete payment", incomplete);
            });
            
            const username = auth.user.username;
            document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
            userEl.textContent = username;
            statusEl.textContent = "متصل وجاهز";

            btn.onclick = async () => {
              try {
                statusEl.textContent = "جاري إنشاء الطلب...";
                const paymentData = {
                  amount: 10.0,
                  memo: "شراء آيفون من متجر أبو سراج فون",
                  metadata: { item: "iPhone 15 Pro Max" }
                };

                const callbacks = {
                  onReadyForServerApproval: (id) => {
                    statusEl.textContent = "في انتظار الموافقة...";
                    postJson("/.api/pi-approve", { paymentId: id, accessToken: auth.accessToken })
                      .then(res => statusEl.textContent = res.ok ? "تمت الموافقة" : "فشلت الموافقة");
                  },
                  onReadyForServerCompletion: (id, txid) => {
                    statusEl.textContent = "جاري التأكيد النهائي...";
                    postJson("/.api/pi-complete", { paymentId: id, txid, accessToken: auth.accessToken })
                      .then(res => statusEl.textContent = res.ok ? "تم الشراء بنجاح! شكراً لك" : "فشل التأكيد");
                  },
                  onCancel: () => statusEl.textContent = "تم إلغاء العملية",
                  onError: (err) => statusEl.textContent = "خطأ: " + err.message
                };

                window.Pi.createPayment(paymentData, callbacks);
              } catch (e) {
                statusEl.textContent = "خطأ: " + e.message;
              }
            };
          } catch (e) {
            statusEl.textContent = "يرجى الفتح من Pi Browser";
          }
        }
        
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initPay);
        } else {
          initPay();
        }
      })();
    </script>
  </body>
</html>
