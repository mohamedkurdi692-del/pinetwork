<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>متجر Pi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b0f1a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .box {
      border: 2px solid gold;
      border-radius: 20px;
      padding: 20px;
      margin: 50px auto;
      width: 90%;
      max-width: 400px;
    }

    button {
      background: linear-gradient(gold, green);
      border: none;
      padding: 15px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>متجر Pi</h2>

    <button onclick="buy()">شراء الآن (10 Pi)</button>

    <p id="status"></p>
  </div>

  <script>
    let isPi = false;

    // التحقق إذا داخل Pi Browser
    if (window.Pi) {
      isPi = true;
      Pi.init({ version: "2.0" });
      document.getElementById("status").innerText = "✔ داخل Pi Browser";
    } else {
      document.getElementById("status").innerText = "⚠ تعمل خارج Pi Browser (وضع تجريبي)";
    }

    function buy() {
      if (!isPi) {
        alert("هذه نسخة تجريبية — افتح داخل Pi Browser للدفع الحقيقي");
        return;
      }

      Pi.createPayment({
        amount: 10,
        memo: "شراء منتج",
        metadata: { productId: "1" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          console.log("جاهز للموافقة:", paymentId);
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          console.log("تم الدفع:", txid);
        },
        onCancel: function(paymentId) {
          alert("تم الإلغاء");
        },
        onError: function(error) {
          console.error(error);
        }
      });
    }
  </script>

</body>
</html>
