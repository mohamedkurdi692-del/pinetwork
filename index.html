<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #0b1020; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { background: #4f86ff; color: white; padding: 20px; border-radius: 10px; font-size: 20px; border: none; cursor: pointer; width: 80%; }
    </style>
</head>
<body>
    <h1>متجر أبو سراج</h1>
    <p id="status">جاري الاتصال...</p>
    <button id="payBtn" class="btn">دفع 1 Pi لإتمام المهمة</button>

    <script>
        window.Pi.init({ version: "2.0", sandbox: false });
        
        async function setup() {
            try {
                const auth = await window.Pi.authenticate(['username', 'payments']);
                document.getElementById('status').innerText = "مرحباً: " + auth.user.username;
            } catch (e) {
                document.getElementById('status').innerText = "اضغط على الزر للدفع";
            }
        }

        document.getElementById('payBtn').onclick = () => {
            window.Pi.createPayment({
                amount: 1,
                memo: "المهمة 10",
                metadata: { item: "test" }
            }, {
                onReadyForServerApproval: (id) => console.log("Approved", id),
                onReadyForServerCompletion: (id, txid) => alert("تم الدفع بنجاح!"),
                onCancel: () => alert("تم الإلغاء"),
                onError: (err) => alert("خطأ: " + err.message)
            });
        };
        setup();
    </script>
</body>
</html>
