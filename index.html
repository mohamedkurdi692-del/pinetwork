<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        const pi = window.Pi;
        pi.init({ version: "2.0" });

        async function processPayment(productName, amount) {
            try {
                const payment = await pi.createPayment({
                    amount: amount,
                    memo: "تجربة شراء " + productName + " من متجر أبو سراج",
                    metadata: { productName: productName }
                }, {
                    onReadyForServerApproval: function(paymentId) { console.log("Approval needed"); },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        alert("🎉 تمت عملية الدفع بنجاح! الخطوة 10 اكتملت.");
                    },
                    onCancel: function(paymentId) { console.log("Cancelled"); },
                    onError: function(error) { alert("خطأ: يرجى المحاولة من متصفح Pi"); }
                });
            } catch (err) {
                alert("يرجى فتح المتجر من داخل تطبيق Pi Browser");
            }
        }
    </script>

    <style>
        :root { --gold: #ff9800; --bg: #0b1020; --card: rgba(255,255,255,0.06); --red: #ff4d4d; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; text-align: center; }
        header { background: rgba(11, 16, 32, 0.9); padding: 20px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .status-badge { display: inline-flex; align-items: center; background: rgba(255, 77, 77, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--red); margin-top: 10px; }
        .dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; margin-left: 8px; box-shadow: 0 0 5px var(--red); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .about { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,152,0,0.2); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .contact-btn { display: block; background: #25D366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    </div>

    <h3 style="text-align: right; color: var(--gold);">الأجهزة (اختبار الدفع):</h3>
    <div class="grid">
        <div class="item">
            <div style="font-size: 2rem;">📱</div>
            <h4 style="margin:5px 0;">iPhone 15</h4>

    <a href="https://wa.me/9647515037922" class="contact-grid contact-btn">واتساب المبيعات</a>
    <a href="tel:+9647515037922" class="contact-btn" style="background: #333;">اتصال مباشر</a>

    <footer style="margin-top: 40px; font-size: 0.7rem; color: #666;">
        © 2026 أبو سراج فون - جميع الحقوق محفوظة
