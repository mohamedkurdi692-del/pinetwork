    <style>
      /* نفس التصميم الفخم الذي أعجبك */
      body { margin: 0; background: #0b1020; color: #fff; font-family: 'Cairo', sans-serif; text-align: center; }
      header { padding: 20px; border-bottom: 1px solid #f2a900; display: flex; align-items: center; justify-content: center; gap: 10px; }

      .contact-box { margin-top: 20px; display: flex; justify-content: center; gap: 15px; font-size: 24px; }
      .location-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; margin-top: 20px; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <div id="userAvatar" style="width:40px;height:40px;background:#f2a900;border-radius:50%;color:#0b1020;display:flex;align-items:center;justify-content:center;font-weight:bold;">؟</div>
      <div id="usernameDisplay" style="color:#f2a900;font-weight:bold;">جاري التحقق...</div>
    </header>
    
    <div class="card">
      <div style="font-size: 50px;">📱</div>

        <a href="https://wa.me/9647515037922" style="text-decoration:none;">💬</a>
        <a href="https://t.me/+9647515037922" style="text-decoration:none;">✈️</a>

      <div class="location-box">
          <div>كوردستان العراق - دهوك - عقرة</div>

      // أهم جزء: تشغيل الـ SDK بدون انتظار خادم خارجي
      window.Pi.init({ version: "2.0", sandbox: false });

      async function start() {

          const auth = await window.Pi.authenticate(["username", "payments"], (incomplete) => {

          });
          
          document.getElementById('usernameDisplay').textContent = "مرحباً: " + auth.user.username;
          document.getElementById('userAvatar').textContent = auth.user.username.charAt(0).toUpperCase();

          document.getElementById('payBtn').onclick = () => {
            window.Pi.createPayment({
              amount: 10,
              memo: "شراء آيفون من متجر أبو سراج فون",
              metadata: { item: "iPhone 15 Pro Max" }
            }, {
              onReadyForServerApproval: (id) => {
                console.log("Payment Created:", id);
                // هنا السر: نخبر المحفظة أننا وافقنا (تجريبياً)
                alert("تم إنشاء طلب الدفع بنجاح! سيتم فتح المحفظة الآن.");
              },
              onReadyForServerCompletion: (id, txid) => { alert("تمت العملية!"); },
              onCancel: () => { },
              onError: (err) => { alert("خطأ: " + err.message); }
            });
          };
        } catch (e) {
          document.getElementById('usernameDisplay').textContent = "افتح الموقع من Pi Browser فقط";
        }
      }
      start();
    </script>
