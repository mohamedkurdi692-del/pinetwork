<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <title>أبو سراج فون - Abu Seraj Phone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
      body {
        margin: 0; padding: 0;
        background: #0b1020; color: #fff;
        font-family: 'Cairo', sans-serif;
        min-height: 100vh; display: flex; flex-direction: column;
      }
      header {
        width: 100%; background: rgba(11, 16, 32, 0.9);
        padding: 15px 25px; border-bottom: 1px solid #f2a900;
        display: flex; align-items: center; justify-content: space-between;
        box-sizing: border-box; position: fixed; top: 0; z-index: 100;
      }
      .user-avatar {
        width: 40px; height: 40px; background: #f2a900;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-weight: 800; color: #0b1020;
      }
      .username { font-size: 16px; font-weight: 700; color: #f2a900; }
      
      .main-content {
        flex: 1; display: flex; justify-content: center; align-items: center;
        padding: 100px 20px 40px;
      }
      .card {
        background: #1a2235; padding: 30px; border-radius: 30px;
        border: 2px solid #f2a900; text-align: center; width: 100%; max-width: 360px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      }
      .title-ar { font-size: 26px; color: #f2a900; margin: 5px 0; font-weight: 900; }
      .title-ku { font-size: 22px; color: #fff; margin: 5px 0; font-weight: 700; }
      .title-en { font-size: 18px; color: #ccc; margin: 5px 0; font-weight: 400; }
      
      .price { font-size: 35px; color: #f2a900; font-weight: 900; margin: 25px 0; }
      
      .pay-btn {
        background: linear-gradient(135deg, #f2a900 0%, #d49400 100%);
        color: #0b1020; border: none; padding: 18px;
        font-size: 18px; font-weight: 800; border-radius: 15px;
        cursor: pointer; width: 100%; transition: 0.3s;
      }
      .pay-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(242, 169, 0, 0.3); }
      
      .contact-box {
        margin-top: 25px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      .contact-link {
        text-decoration: none;
        font-size: 24px;
        background: rgba(255, 255, 255, 0.1);
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: 0.3s;
      }
      .contact-link:hover { background: #f2a900; color: #0b1020; }

      .location-box {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px; border-radius: 15px; margin-top: 20px;
        font-size: 13px; line-height: 1.8; text-align: center;
      }
      .lang-label { color: #f2a900; font-weight: bold; margin-left: 5px; }
    </style>
  </head>
  <body>
    <header>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="user-avatar" id="userAvatar">؟</div>
        <div id="usernameDisplay" class="username">جاري الاتصال...</div>
      </div>
    </header>
    
    <main class="main-content">
      <div class="card">
        <div style="font-size: 50px; margin-bottom: 10px;">📱</div>
        
        <div class="title-ar">أبو سراج فون</div>
        <div class="title-ku">بابێ سراج</div>
        <div class="title-en">Abu Seraj Phone</div>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <h3 style="margin-bottom: 0;">iPhone 15 Pro Max</h3>
        <div class="price">10 Pi</div>
        
        <button id="payBtn" class="pay-btn">إتمام الشراء | کڕین | Buy Now</button>

        <div class="contact-box">
          <a href="https://wa.me/9647515037922" class="contact-link" title="WhatsApp">💬</a>
          <a href="https://t.me/+9647515037922" class="contact-link" title="Telegram">✈️</a>
          <a href="viber://chat?number=9647515037922" class="contact-link" title="Viber">💜</a>
        </div>

        <div class="location-box">
            <div><span class="lang-label">العربية:</span> كوردستان العراق - دهوك - عقرة</div>
            <div><span class="lang-label">كوردى:</span> كوردستانا عيراقێ - دهۆك - ئاكرێ</div>
            <div><span class="lang-label">English:</span> Kurdistan Iraq - Duhok - Akre</div>
        </div>
      </div>
    </main>

    <script>
      const Pi = window.Pi;
      Pi.init({ version: "2.0", sandbox: false });


      async function initApp() {
        try {
          const auth = await Pi.authenticate(["username", "payments"], (incomplete) => {
            console.log("Incomplete payment:", incomplete);
          });
          
          document.getElementById('usernameDisplay').textContent = auth.user.username;
          document.getElementById('userAvatar').textContent = auth.user.username.charAt(0).toUpperCase();

          document.getElementById('payBtn').onclick = async () => {
            const paymentData = {
              amount: 10,
              memo: "iPhone 15 Pro Max - Abu Seraj Phone",
              metadata: { item: "iPhone 15 Pro Max" }
            };

            const callbacks = {
              onReadyForServerApproval: (id) => { console.log("Approved"); },
              onReadyForServerCompletion: (id, txid) => { alert("تمت العملية بنجاح! | سەرکەوتوو بوو!"); },
              onCancel: () => { console.log("Cancelled"); },
              onError: (err) => { alert("Error: " + err.message); }
            };

            Pi.createPayment(paymentData, callbacks);
          };
        } catch (e) {
          console.error(e);
        }
      }
      initApp();
    </script>
  </body>
</html>
