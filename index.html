<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو سراج فون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        const pi = window.Pi;
        pi.init({ version: "2.0" });

        async function processPayment(productName, amount) {
            try {
                await pi.createPayment({
                    amount: amount,
                    memo: "شراء " + productName,
                    metadata: { productName: productName }
                }, {
                    onReadyForServerApproval: (paymentId) => console.log("بانتظار الموافقة"),
                    onReadyForServerCompletion: (paymentId) => alert("🎉 نجحت العملية! اكتملت الخطوة 10"),
                    onCancel: (paymentId) => console.log("تم الإلغاء"),
                    onError: (error) => console.error(error)
                });
            } catch (err) {
                console.error(err);
            }
        }
    </script>
    <style>
        body { background: #0b1020; color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid #ff9800; }
        .btn { background: #ff9800; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>أبو سراج فون</h1>
        <p>عقرة - دهوك</p>
        <hr>
        <h3>iPhone 15</h3>
        <button class="btn" onclick="processPayment('iPhone 15', 10)">شراء (10 Pi)</button>
    </div>
</body>
</html>
